
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Special+Elite&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#111;--card:#1a1008;--border:#8B4513;--orange:#e8820c;--red:#cc2200;--yellow:#e8c40c;--green:#2d8a2d;--blue:#1a6aaa;--text:#f5e6d0;--muted:#9a8060}
  body{background:var(--bg);color:var(--text);font-family:'Special Elite',serif;min-height:100vh}
  .app{max-width:980px;margin:0 auto;padding:16px}

  /* HEADER */
  .header{text-align:center;padding:20px 0 10px;border-bottom:3px solid var(--orange);margin-bottom:16px}
  .header-badge{display:inline-block;background:var(--red);color:#fff;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;padding:4px 16px;border-radius:2px;margin-bottom:8px}
  .header h1{font-family:'Oswald',sans-serif;font-size:clamp(26px,6vw,50px);font-weight:700;color:var(--orange);letter-spacing:4px;text-transform:uppercase;line-height:1}
  .header-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:4px}

  /* PIX BANNER */
  .pix-banner{background:linear-gradient(135deg,#0d1f0d,#0a1a0a);border:1px solid #2d8a2d;border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pix-icon{font-size:28px;flex-shrink:0}
  .pix-info{flex:1;min-width:180px}
  .pix-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:#2d8a2d;text-transform:uppercase}
  .pix-key{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#6dd96d;letter-spacing:2px;margin-top:2px}
  .pix-sub{font-size:11px;color:rgba(109,217,109,0.6);margin-top:2px;font-family:'Oswald',sans-serif;letter-spacing:1px}
  .pix-copy-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:8px 16px;background:rgba(45,138,45,0.25);border:1px solid #2d8a2d;color:#6dd96d;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .2s;flex-shrink:0}
  .pix-copy-btn:hover{background:rgba(45,138,45,0.45)}

  /* SUMMARY */
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
  .summary-card .label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Oswald',sans-serif}
  .summary-card .value{font-size:clamp(14px,3vw,22px);font-family:'Oswald',sans-serif;font-weight:700;margin-top:3px}
  .val-red{color:var(--red)}.val-yellow{color:var(--yellow)}.val-green{color:#6dd96d}.val-blue{color:#6ab4e8}

  /* CONTROLS */
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .filter-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .2s;text-transform:uppercase}
  .filter-btn.active{color:#000}
  .filter-btn.all.active{background:var(--orange);border-color:var(--orange);color:#000}
  .filter-btn.devendo.active{background:var(--red);border-color:var(--red);color:#fff}
  .filter-btn.parcial.active{background:var(--yellow);border-color:var(--yellow);color:#000}
  .filter-btn.quitado.active{background:var(--green);border-color:var(--green);color:#fff}
  .add-btn{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 18px;border:2px solid var(--orange);background:var(--orange);color:#000;cursor:pointer;border-radius:3px;margin-left:auto;text-transform:uppercase;transition:all .2s}
  .add-btn:hover{background:transparent;color:var(--orange)}

  /* CARDS */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
  .wanted-card{background:var(--card);border:2px solid var(--border);border-radius:4px;padding:0;position:relative;overflow:hidden}
  .wanted-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px}
  .wanted-card.devendo::before{background:var(--red)}
  .wanted-card.parcial::before{background:var(--yellow)}
  .wanted-card.quitado::before{background:var(--green)}
  .wanted-card.alert-pulse{animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{border-color:var(--border)}50%{border-color:var(--red);box-shadow:0 0 12px rgba(204,34,0,0.45)}}

  /* CARD HEADER */
  .card-header{padding:14px 14px 0;display:flex;justify-content:space-between;align-items:flex-start}
  .wanted-label{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--orange);border:1px solid var(--orange);padding:2px 8px;border-radius:2px}
  .status-badge{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:2px}
  .badge-devendo{background:var(--red);color:#fff}.badge-parcial{background:var(--yellow);color:#000}.badge-quitado{background:var(--green);color:#fff}

  /* MUGSHOT + NAME ROW */
  .card-identity{display:flex;gap:14px;align-items:center;padding:12px 14px}
  .mugshot-frame{width:76px;height:96px;border:3px solid var(--border);background:#0d0d0d;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;cursor:pointer;flex-shrink:0;border-radius:2px}
  .mugshot-frame:hover .photo-overlay{opacity:1}
  .photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:5;font-size:22px}
  .mugshot-photo{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;z-index:2}
  .mugshot-bars{position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;display:flex;gap:7px;padding:0 5px}
  .mugshot-bars span{flex:1;background:rgba(100,60,0,0.45);height:100%}
  .sil-head{width:28px;height:32px;background:#222;border-radius:50% 50% 40% 40%;margin:0 auto;position:relative;z-index:1}
  .sil-body{width:46px;height:36px;background:#222;border-radius:12px 12px 0 0;margin:2px auto 0;position:relative;z-index:1}
  .mugshot-num{font-family:'Oswald',sans-serif;font-size:8px;color:var(--muted);letter-spacing:1px;background:#000;width:100%;text-align:center;padding:2px;z-index:6;position:relative}
  .photo-input-hidden{display:none}
  .identity-info{flex:1;min-width:0}
  .identity-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;color:var(--text);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .identity-date{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:3px}
  .identity-obs{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;line-height:1.35}
  .identity-totals{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .id-total{background:rgba(0,0,0,0.35);border-radius:3px;padding:5px 8px;text-align:center}
  .id-total .tl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
  .id-total .tv{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;margin-top:1px}

  /* DEBITOS */
  .debitos-section{border-top:1px solid rgba(139,69,19,0.35);padding:10px 14px}
  .debitos-title{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .debitos-list{display:flex;flex-direction:column;gap:5px}
  .debito-item{display:grid;grid-template-columns:auto 1fr auto auto;gap:6px;align-items:center;background:rgba(0,0,0,0.3);border-radius:3px;padding:6px 8px;border-left:3px solid transparent}
  .debito-item.status-pago{border-left-color:var(--green);opacity:.75}
  .debito-item.status-pendente{border-left-color:var(--red)}
  .debito-item.status-futuro{border-left-color:var(--blue);opacity:.85}
  .debito-item.status-parcial{border-left-color:var(--yellow)}
  .deb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
  .deb-info{min-width:0}
  .deb-desc{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .deb-date{font-size:10px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:1px;margin-top:1px}
  .deb-valor{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}
  .deb-status{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:2px;flex-shrink:0;text-transform:uppercase;cursor:pointer;user-select:none;transition:opacity .15s}
  .deb-status:hover{opacity:.75}
  .ds-pago{background:rgba(45,138,45,0.25);color:#6dd96d}
  .ds-pendente{background:rgba(204,34,0,0.25);color:#ff7a6e}
  .ds-futuro{background:rgba(26,106,170,0.25);color:#6ab4e8}
  .ds-parcial{background:rgba(232,196,12,0.2);color:var(--yellow)}
  .deb-del{background:none;border:none;color:rgba(154,128,96,0.5);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;line-height:1}
  .deb-del:hover{color:var(--red)}
  .add-deb-btn{width:100%;margin-top:6px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px;background:rgba(232,130,12,0.12);border:1px dashed rgba(232,130,12,0.35);color:rgba(232,130,12,0.6);border-radius:3px;cursor:pointer;text-transform:uppercase;transition:all .2s}
  .add-deb-btn:hover{background:rgba(232,130,12,0.22);color:var(--orange);border-style:solid}

  /* COMPROVANTES */
  .comp-section{border-top:1px solid rgba(139,69,19,0.35);padding:8px 14px}
  .comp-header-row{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  .comp-list{display:flex;flex-direction:column;gap:4px}
  .comp-item{background:rgba(0,0,0,0.3);border:1px solid rgba(139,69,19,0.3);border-radius:3px;padding:5px 8px;display:flex;align-items:center;gap:7px;font-size:11px}
  .comp-item.is-image{cursor:pointer}
  .comp-item.is-image:hover{border-color:var(--orange)}
  .comp-thumb{width:28px;height:28px;object-fit:cover;border-radius:2px;flex-shrink:0}
  .comp-icon{font-size:16px;flex-shrink:0;width:28px;text-align:center}
  .comp-info{flex:1;overflow:hidden}
  .comp-name{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
  .comp-note{color:var(--muted);font-size:10px;margin-top:1px}
  .comp-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;opacity:.6}
  .comp-del:hover{opacity:1}
  .comp-nota-item{background:rgba(0,0,0,0.3);border:1px solid rgba(139,69,19,0.3);border-radius:3px;padding:5px 8px;font-size:11px;display:flex;align-items:flex-start;gap:7px}
  .nota-icon{font-size:14px;flex-shrink:0}
  .nota-text{flex:1;color:var(--text)}
  .nota-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;opacity:.6}
  .nota-del:hover{opacity:1}

  /* CARD FOOTER */
  .card-footer{padding:10px 14px 14px;display:flex;gap:6px}
  .btn-edit,.btn-del,.btn-comp{flex:1;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 3px;border-radius:3px;cursor:pointer;text-transform:uppercase;border:none;transition:all .2s}
  .btn-edit{background:rgba(232,130,12,0.18);color:var(--orange);border:1px solid rgba(232,130,12,0.35)}
  .btn-edit:hover{background:rgba(232,130,12,0.32)}
  .btn-del{background:rgba(204,34,0,0.18);color:var(--red);border:1px solid rgba(204,34,0,0.32)}
  .btn-del:hover{background:rgba(204,34,0,0.32)}
  .btn-comp{background:rgba(232,196,12,0.12);color:var(--yellow);border:1px solid rgba(232,196,12,0.3)}
  .btn-comp:hover{background:rgba(232,196,12,0.25)}

  /* EMPTY */
  .empty-state{text-align:center;padding:48px 16px;color:var(--muted);grid-column:1/-1}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:2px}

  /* OVERLAYS */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:#111;border:2px solid var(--orange);border-radius:6px;width:100%;max-width:460px;padding:22px;position:relative;max-height:92vh;overflow-y:auto}
  .modal-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;text-align:center;border-bottom:1px solid rgba(232,130,12,0.3);padding-bottom:10px}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:#1a1a1a;border:1px solid rgba(139,69,19,0.6);border-radius:3px;color:var(--text);font-family:'Special Elite',serif;font-size:13px;padding:7px 9px;outline:none;transition:border-color .2s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange)}
  .form-group select option{background:#1a1a1a}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .btn-save{flex:1;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:9px;background:var(--orange);border:none;color:#000;border-radius:3px;cursor:pointer;text-transform:uppercase}
  .btn-cancel{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:9px 18px;background:transparent;border:1px solid var(--muted);color:var(--muted);border-radius:3px;cursor:pointer;text-transform:uppercase}
  .btn-cancel:hover{border-color:var(--text);color:var(--text)}
  .close-btn{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .close-btn:hover{color:var(--text)}

  .modal-comp{background:#111;border:2px solid var(--yellow);border-radius:6px;width:100%;max-width:440px;padding:22px;position:relative;max-height:92vh;overflow-y:auto}
  .modal-comp .modal-title{color:var(--yellow);border-bottom-color:rgba(232,196,12,0.3)}
  .comp-upload-zone{border:2px dashed rgba(139,69,19,0.5);border-radius:4px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
  .comp-upload-zone:hover{border-color:var(--yellow)}
  .comp-upload-zone p{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);margin-top:6px}
  .divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:10px;letter-spacing:2px;font-family:'Oswald',sans-serif}
  .divider::before,.divider::after{content:'';flex:1;border-top:1px solid rgba(139,69,19,0.3)}
  .nota-row{display:flex;gap:8px}
  .nota-row input{flex:1}
  .nota-row button{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;padding:7px 12px;background:rgba(232,196,12,0.2);border:1px solid rgba(232,196,12,0.4);color:var(--yellow);border-radius:3px;cursor:pointer;white-space:nowrap;text-transform:uppercase}
  .comp-preview-list{display:flex;flex-direction:column;gap:5px;margin-top:12px}
  .comp-preview-item{background:rgba(0,0,0,0.4);border:1px solid rgba(139,69,19,0.3);border-radius:3px;padding:7px;display:flex;align-items:center;gap:8px}
  .comp-preview-thumb{width:36px;height:36px;object-fit:cover;border-radius:2px;border:1px solid rgba(139,69,19,0.4)}
  .comp-preview-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
  .comp-preview-info{flex:1;overflow:hidden}
  .comp-preview-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .comp-preview-type{font-size:10px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .comp-preview-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:0 4px;opacity:.7;flex-shrink:0}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
  .lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border:2px solid var(--border);border-radius:4px}
  .lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;font-family:'Oswald',sans-serif}

  /* MODAL DEBITO */
  .modal-deb{background:#111;border:2px solid var(--blue);border-radius:6px;width:100%;max-width:420px;padding:22px;position:relative;max-height:92vh;overflow-y:auto}
  .modal-deb .modal-title{color:#6ab4e8;border-bottom-color:rgba(26,106,170,0.35)}
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
  .cat-btn{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:7px 4px;border:1px solid rgba(139,69,19,0.4);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer;text-align:center;text-transform:uppercase;transition:all .2s}
  .cat-btn.sel{background:rgba(232,130,12,0.25);border-color:var(--orange);color:var(--orange)}
  .cat-btn .cat-icon{display:block;font-size:18px;margin-bottom:2px}

  @media(max-width:520px){
    .summary-grid{grid-template-columns:1fr 1fr}
    .summary-card:last-child,.summary-card:nth-child(3){grid-column:1/-1}
    .form-row,.form-row3{grid-template-columns:1fr}
    .controls{gap:6px}.add-btn{width:100%;margin-left:0}
    .cat-grid{grid-template-columns:repeat(4,1fr)}
  }

  /* LOGIN */
  .login-screen{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-box{background:#111;border:2px solid var(--orange);border-radius:8px;padding:36px 28px;width:100%;max-width:360px;text-align:center}
  .login-star{font-size:40px;margin-bottom:8px}
  .login-title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:var(--orange);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
  .login-sub{font-family:'Oswald',sans-serif;font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:28px}
  .login-label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;text-align:left;margin-bottom:6px}
  .login-input{width:100%;background:#1a1a1a;border:1px solid rgba(139,69,19,0.6);border-radius:4px;color:var(--text);font-family:'Special Elite',serif;font-size:18px;padding:10px 14px;outline:none;text-align:center;letter-spacing:6px;margin-bottom:4px;transition:border-color .2s}
  .login-input:focus{border-color:var(--orange)}
  .login-btn{width:100%;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:12px;background:var(--orange);border:none;color:#000;border-radius:4px;cursor:pointer;text-transform:uppercase;margin-top:10px;transition:opacity .2s}
  .login-btn:hover{opacity:.85}
  .login-btn-view{width:100%;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:10px;background:transparent;border:1px solid rgba(139,69,19,0.4);color:var(--muted);border-radius:4px;cursor:pointer;text-transform:uppercase;margin-top:8px;transition:all .2s}
  .login-btn-view:hover{border-color:var(--muted);color:var(--text)}
  .login-err{font-family:'Oswald',sans-serif;font-size:11px;color:var(--red);letter-spacing:1px;margin-top:8px;min-height:16px}
  .login-divider{display:flex;align-items:center;gap:10px;margin:20px 0 4px;color:var(--muted);font-size:10px;letter-spacing:2px;font-family:'Oswald',sans-serif}
  .login-divider::before,.login-divider::after{content:'';flex:1;border-top:1px solid rgba(139,69,19,0.3)}

  /* BANNER LEITURA */
  .readonly-banner{background:rgba(26,106,170,0.12);border:1px solid rgba(26,106,170,0.4);border-radius:6px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .readonly-banner span{font-family:'Oswald',sans-serif;font-size:12px;color:#6ab4e8;letter-spacing:1px;flex:1}
  .readonly-exit{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:5px 12px;background:transparent;border:1px solid rgba(26,106,170,0.4);color:#6ab4e8;border-radius:3px;cursor:pointer;text-transform:uppercase}
  .readonly-exit:hover{background:rgba(26,106,170,0.2)}

  /* ocultar ações no modo leitura */
  body.readonly .btn-edit,
  body.readonly .btn-del,
  body.readonly .btn-comp,
  body.readonly .add-btn,
  body.readonly .add-deb-btn,
  body.readonly .deb-del,
  body.readonly .comp-del,
  body.readonly .nota-del{display:none}
  body.readonly .deb-status{pointer-events:none;cursor:default}
  body.readonly .mugshot-frame{pointer-events:none;cursor:default}
  body.readonly .mugshot-frame .photo-overlay{display:none}
</style>

<div class="app" id="root"></div>

<script>
const fmt=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const uid=()=>'_'+Math.random().toString(36).slice(2,10);



const CATS=[
  {id:'pix',icon:'💸',label:'Pix'},
  {id:'dinheiro',icon:'💵',label:'Dinheiro'},
  {id:'cartao',icon:'💳',label:'Cartão'},
  {id:'transferencia',icon:'🏦',label:'Transf.'},
  {id:'aluguel',icon:'🏠',label:'Aluguel'},
  {id:'emprestimo',icon:'🤝',label:'Emprést.'},
  {id:'servico',icon:'🔧',label:'Serviço'},
  {id:'outro',icon:'📌',label:'Outro'},
];
const CAT_MAP=Object.fromEntries(CATS.map(c=>[c.id,c]));
const STATUS_DEB=[
  {id:'pendente',label:'Pendente',cls:'ds-pendente',val:'val-red'},
  {id:'parcial',label:'Parcial',cls:'ds-parcial',val:'val-yellow'},
  {id:'pago',label:'Pago',cls:'ds-pago',val:'val-green'},
  {id:'futuro',label:'Futuro',cls:'ds-futuro',val:'val-blue'},
];

const SAMPLES=[
  {id:'_aaa',nome:'João Caloteiro Silva',foto:'',data:'2025-12-01',status:'devendo',obs:'Sempre com desculpa nova',comprovantes:[],debitos:[
    {id:uid(),cat:'emprestimo',desc:'Empréstimo dezembro',valor:400,venc:'2026-01-05',status:'pendente'},
    {id:uid(),cat:'pix',desc:'Pix que não voltou',valor:250,venc:'2026-02-10',status:'pendente'},
    {id:uid(),cat:'cartao',desc:'Cartão Nubank parcelado',valor:200,venc:'2026-03-15',status:'futuro'},
  ]},
  {id:'_bbb',nome:'Maria Sem-Dó Santos',foto:'',data:'2026-01-15',status:'parcial',obs:'Pagou metade, sumiu',comprovantes:[{id:uid(),tipo:'nota',nome:'Nota',conteudo:'Pagou R$600 em dinheiro dia 10/03.'}],debitos:[
    {id:uid(),cat:'dinheiro',desc:'Almoço do mês passado',valor:180,venc:'2026-01-20',status:'pago'},
    {id:uid(),cat:'aluguel',desc:'Parte do aluguel fev',valor:600,venc:'2026-02-01',status:'parcial'},
    {id:uid(),cat:'transferencia',desc:'Transferência pendente',valor:420,venc:'2026-04-01',status:'pendente'},
  ]},
  {id:'_ccc',nome:'Pedro Enganador Jr.',foto:'',data:'2026-02-10',status:'quitado',obs:'Quitou tudo!',comprovantes:[],debitos:[
    {id:uid(),cat:'pix',desc:'Pix devolvido',valor:320,venc:'2026-02-10',status:'pago'},
  ]},
];

const DADOS_FIXOS=`__DADOS_INJETADOS__`;
let devedores=DADOS_FIXOS&&DADOS_FIXOS!=='__DADOS_INJETADOS__'?JSON.parse(DADOS_FIXOS):SAMPLES;
let filter='all';
let modalState=null;
let compPendentes=[];
let debPendente={cat:'outro',desc:'',valor:'',venc:'',status:'pendente'};

function save(){/* somente leitura — sem persistência */}

function calcDev(d){
  const debs=d.debitos||[];
  const total=debs.reduce((a,x)=>a+(Number(x.valor)||0),0);
  const pago=debs.filter(x=>x.status==='pago').reduce((a,x)=>a+(Number(x.valor)||0),0);
  const pendente=debs.filter(x=>['pendente','parcial'].includes(x.status)).reduce((a,x)=>a+(Number(x.valor)||0),0);
  const futuro=debs.filter(x=>x.status==='futuro').reduce((a,x)=>a+(Number(x.valor)||0),0);
  return{total,pago,pendente,futuro,saldo:total-pago};
}

function globalTotals(){
  let receber=0,recebido=0,futuro=0,saldo=0;
  devedores.forEach(d=>{const c=calcDev(d);receber+=c.total;recebido+=c.pago;futuro+=c.futuro;saldo+=c.saldo});
  return{receber,recebido,futuro,saldo};
}

function devStatus(d){
  const c=calcDev(d);
  if(c.saldo<=0) return 'quitado';
  if(c.pago>0) return 'parcial';
  return 'devendo';
}

function render(){
  const root=document.getElementById('root');
  const t=globalTotals();
  const visible=filter==='all'?devedores:devedores.filter(d=>devStatus(d)===filter);

  root.innerHTML=`
  <div class="header">
    <div class="header-badge">⭐ ESCRITÓRIO ESPECIAL ⭐</div>
    <h1>Lista de Procurados</h1>
    <div class="header-sub">★ DEPARTAMENTO DE COBRANÇAS ★</div>
  </div>

  <div class="pix-banner">
    <div class="pix-icon">💰</div>
    <div class="pix-info">
      <div class="pix-label">Chave Pix para Recebimento</div>
      <div class="pix-key">(27) 99532-6724</div>
      <div class="pix-sub">Telefone · Arthur Vilaça</div>
    </div>
    <button class="pix-copy-btn" onclick="copyPix()">📋 Copiar Chave</button>
  </div>



  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">Total Devidos</div>
      <div class="value val-red">${fmt(t.receber)}</div>
    </div>
    <div class="summary-card">
      <div class="label">Já Recebido</div>
      <div class="value val-green">${fmt(t.recebido)}</div>
    </div>
    <div class="summary-card">
      <div class="label">Saldo Aberto</div>
      <div class="value val-yellow">${fmt(t.saldo)}</div>
    </div>
    <div class="summary-card">
      <div class="label">Débitos Futuros</div>
      <div class="value val-blue">${fmt(t.futuro)}</div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn all ${filter==='all'?'active':''}" onclick="setFilter('all')">Todos (${devedores.length})</button>
    <button class="filter-btn devendo ${filter==='devendo'?'active':''}" onclick="setFilter('devendo')">Devendo (${devedores.filter(d=>devStatus(d)==='devendo').length})</button>
    <button class="filter-btn parcial ${filter==='parcial'?'active':''}" onclick="setFilter('parcial')">Parcial (${devedores.filter(d=>devStatus(d)==='parcial').length})</button>
    <button class="filter-btn quitado ${filter==='quitado'?'active':''}" onclick="setFilter('quitado')">Quitado (${devedores.filter(d=>devStatus(d)==='quitado').length})</button>
    <button class="add-btn" onclick="openEditModal(null)">+ Novo Procurado</button>
  </div>

  <div class="cards-grid">
    ${visible.length===0?`<div class="empty-state"><div class="icon">🏜️</div><p>Nenhum devedor encontrado.</p></div>`:''}
    ${visible.map(d=>renderCard(d)).join('')}
  </div>

  `;
}

function renderCard(d){
  const st=devStatus(d);
  const pulse=st==='devendo';
  const badgeClass=st==='devendo'?'badge-devendo':st==='parcial'?'badge-parcial':'badge-quitado';
  const statusLabel=st==='devendo'?'🔴 DEVENDO':st==='parcial'?'🟡 PARCIAL':'🟢 QUITADO';
  const numId='#'+d.id.replace('_','').slice(0,6).toUpperCase();
  const c=calcDev(d);
  const debs=d.debitos||[];
  const comps=d.comprovantes||[];

  return`
  <div class="wanted-card ${st} ${pulse?'alert-pulse':''}">
    <div class="card-header">
      <span class="wanted-label">WANTED</span>
      <span class="status-badge ${badgeClass}">${statusLabel}</span>
    </div>

    <div class="card-identity">
      <div class="mugshot-frame" onclick="triggerPhoto('${d.id}')" title="Clique para adicionar foto">
        ${d.foto?`<img class="mugshot-photo" src="${d.foto}" alt="foto"/>`:`<div class="sil-head"></div><div class="sil-body"></div>`}
        <div class="mugshot-bars"><span></span><span></span><span></span><span></span></div>
        <div class="photo-overlay">${d.foto?'🔄':'📷'}</div>
        <div class="mugshot-num">${numId}</div>
      </div>
      <input type="file" accept="image/*" class="photo-input-hidden" id="pi-${d.id}" onchange="handlePhoto(event,'${d.id}')"/>
      <div class="identity-info">
        <div class="identity-name">${d.nome||'Sem Nome'}</div>
        <div class="identity-date">📅 ${fmtDate(d.data)}</div>
        ${d.obs?`<div class="identity-obs">💬 ${d.obs}</div>`:''}
        <div class="identity-totals">
          <div class="id-total"><div class="tl">Pendente</div><div class="tv val-red">${fmt(c.pendente)}</div></div>
          <div class="id-total"><div class="tl">Pago</div><div class="tv val-green">${fmt(c.pago)}</div></div>
          <div class="id-total"><div class="tl">Futuro</div><div class="tv val-blue">${fmt(c.futuro)}</div></div>
          <div class="id-total"><div class="tl">Saldo</div><div class="tv val-yellow">${fmt(c.saldo)}</div></div>
        </div>
      </div>
    </div>

    <div class="debitos-section">
      <div class="debitos-title">
        <span>📋 Débitos (${debs.length})</span>
        <span style="color:var(--orange);font-size:9px">Total: ${fmt(c.total)}</span>
      </div>
      <div class="debitos-list">
        ${debs.length===0?`<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;font-family:'Oswald',sans-serif;letter-spacing:1px">Nenhum débito registrado</div>`:''}
        ${debs.map(db=>{
          const cat=CAT_MAP[db.cat]||CAT_MAP.outro;
          const sc=db.status==='pago'?'status-pago':db.status==='futuro'?'status-futuro':db.status==='parcial'?'status-parcial':'status-pendente';
          const vc=db.status==='pago'?'val-green':db.status==='futuro'?'val-blue':db.status==='parcial'?'val-yellow':'val-red';
          const sd=STATUS_DEB.find(s=>s.id===db.status)||STATUS_DEB[0];
          return`<div class="debito-item ${sc}">
            <span class="deb-icon" title="${cat.label}">${cat.icon}</span>
            <div class="deb-info">
              <div class="deb-desc">${db.desc||cat.label}</div>
              ${db.venc?`<div class="deb-date">Venc: ${fmtDate(db.venc)}</div>`:''}
            </div>
            <span class="deb-valor ${vc}">${fmt(db.valor)}</span>
            <span class="deb-status ${sd.cls}" onclick="cycleDebStatus('${d.id}','${db.id}')" title="Clique para mudar status">${sd.label} ↻</span>
            <button class="deb-del" onclick="removeDebito('${d.id}','${db.id}')">✕</button>
          </div>`;
        }).join('')}
      </div>
      <button class="add-deb-btn" onclick="openDebModal('${d.id}')">+ Adicionar Débito</button>
    </div>

    ${comps.length>0?`
    <div class="comp-section">
      <div class="comp-header-row">📎 Comprovantes (${comps.length})</div>
      <div class="comp-list">
        ${comps.map(c=>c.tipo==='nota'?`
          <div class="comp-nota-item">
            <span class="nota-icon">📝</span>
            <span class="nota-text">${c.conteudo}</span>
            <button class="nota-del" onclick="removeComp('${d.id}','${c.id}')">✕</button>
          </div>`:`
          <div class="comp-item ${c.tipo==='imagem'?'is-image':''}" ${c.tipo==='imagem'?`onclick="openLightbox('${c.id}','${d.id}')"`:''}> 
            ${c.tipo==='imagem'?`<img class="comp-thumb" src="${c.conteudo}" alt="${c.nome}"/>`:`<span class="comp-icon">${c.tipo==='pdf'?'📄':'📎'}</span>`}
            <div class="comp-info"><div class="comp-name">${c.nome}</div>${c.dataAnexo?`<div class="comp-note">${c.dataAnexo}</div>`:''}</div>
            <button class="comp-del" onclick="removeComp('${d.id}','${c.id}')">✕</button>
          </div>`).join('')}
      </div>
    </div>`:''}

    <div class="card-footer">
      <button class="btn-comp" onclick="openCompModal('${d.id}')">📎 Comprov.</button>
      <button class="btn-edit" onclick="openEditModal('${d.id}')">✏️ Editar</button>
      <button class="btn-del" onclick="removeDevedor('${d.id}')">🗑️ Remover</button>
    </div>
  </div>`;
}

function copyPix(){
  navigator.clipboard.writeText('27995326724').then(()=>{
    const btn=document.querySelector('.pix-copy-btn');
    if(btn){const orig=btn.innerHTML;btn.innerHTML='✅ Copiado!';setTimeout(()=>{btn.innerHTML=orig},2000)}
  }).catch(()=>alert('Chave Pix: 27995326724'));
}

function setFilter(f){filter=f;render()}










function handlePhoto(e,devId){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{devedores=devedores.map(d=>d.id===devId?{...d,foto:ev.target.result}:d);save();render()};r.readAsDataURL(f)}

function handleCompFile(e){
  const f=e.target.files[0];if(!f)return;
  const isPdf=f.type==='application/pdf',isImg=f.type.startsWith('image/');
  if(!isPdf&&!isImg){alert('Use JPG, PNG ou PDF.');return}
  const r=new FileReader();
  r.onload=ev=>{const now=new Date().toLocaleDateString('pt-BR');compPendentes.push({id:uid(),tipo:isImg?'imagem':'pdf',nome:f.name,conteudo:ev.target.result,dataAnexo:now});render()};
  r.readAsDataURL(f);
}



function saveComprovantes(devId){if(compPendentes.length===0){closeModal();return}devedores=devedores.map(d=>d.id!==devId?d:{...d,comprovantes:[...(d.comprovantes||[]),...compPendentes]});compPendentes=[];save();modalState=null;render()}
function removeComp(devId,compId){devedores=devedores.map(d=>d.id!==devId?d:{...d,comprovantes:(d.comprovantes||[]).filter(c=>c.id!==compId)});save();render()}

function saveDebito(devId){
  const desc=document.getElementById('d-desc').value.trim();
  const valor=parseFloat(document.getElementById('d-valor').value)||0;
  const venc=document.getElementById('d-venc').value;
  const status=document.getElementById('d-status').value;
  if(!valor){alert('Informe o valor do débito!');return}
  const cat=debPendente.cat;
  const catObj=CAT_MAP[cat]||CAT_MAP.outro;
  const novoDebito={id:uid(),cat,desc:desc||catObj.label,valor,venc,status};
  devedores=devedores.map(d=>d.id!==devId?d:{...d,debitos:[...(d.debitos||[]),novoDebito]});
  save();modalState=null;render();
}

function removeDebito(devId,debId){devedores=devedores.map(d=>d.id!==devId?d:{...d,debitos:(d.debitos||[]).filter(x=>x.id!==debId)});save();render()}

const STATUS_CYCLE=['pendente','parcial','pago','futuro'];
function cycleDebStatus(devId,debId){
  devedores=devedores.map(d=>{
    if(d.id!==devId) return d;
    return{...d,debitos:(d.debitos||[]).map(db=>{
      if(db.id!==debId) return db;
      const idx=STATUS_CYCLE.indexOf(db.status);
      const next=STATUS_CYCLE[(idx+1)%STATUS_CYCLE.length];
      return{...db,status:next};
    })};
  });
  save();render();
}

function saveDevedor(existingId){
  const nome=document.getElementById('f-nome').value.trim();
  const data=document.getElementById('f-data').value;
  const obs=document.getElementById('f-obs').value.trim();
  if(!nome){alert('Informe o nome!');return}
  if(existingId&&devedores.find(d=>d.id===existingId)){
    devedores=devedores.map(d=>d.id===existingId?{...d,nome,data,obs}:d);
  }else{
    devedores=[{id:uid(),nome,foto:'',data,obs,comprovantes:[],debitos:[]},...devedores];
  }
  save();modalState=null;render();
}

function removeDevedor(id){
  const d=devedores.find(x=>x.id===id);
  if(!d)return;
  if(confirm(`Remover "${d.nome}" da lista?`)){devedores=devedores.filter(x=>x.id!==id);save();render()}
}


document.body.classList.add('readonly');
render();


</script>
